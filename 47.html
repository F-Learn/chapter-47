<script>
    // Chapter 47: Assessment of Kidney and Urinary Function – 38 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. The care team is considering the use of dialysis in a client whose renal function is progressively declining. Renal replacement therapy is indicated in which situation?",
            options: [
                "A. creatinine level drops below 1.2 mg/dl (110mmol/L)",
                "B. blood urea nitrogen (BUN) is above 15 mg/dl",
                "C. urinalysis (dipstick test) reveals 140 mg/dl of protein",
                "D. functioning nephrons are less than 20%"
            ],
            correct: 3, // D
            rationale: "When the total number of functioning nephrons is less than 20%, renal replacement therapy needs to be considered. Dialysis is an example of renal replacement therapy. Prior to the loss of greater than 80% of the nephron's functioning ability, the client may have mild symptoms of compromised renal function, but symptom management is often obtained through dietary modifications and drug therapy. The listed creatinine level is within normal range for men and slightly elevated for women. The BUN levels are within normal ranges. Proteinuria up to 150 mg/dl, as an occasional finding, is considered normal. Persistent proteinuria can indicate several medical problems including glomerular disease. (PTS:1 REF:p.1536)"
        },
        {
            id: 2,
            question: "2. The nurse is caring for a client who has been diagnosed with renal calculi. Prompt management of renal calculi is most important when the stone is located where?",
            options: [
                "A. In the ureteropelvic junction",
                "B. In the ureteral segment near the sacroiliac junction",
                "C. In the ureterovesical junction",
                "D. In the urethra"
            ],
            correct: 0, // A
            rationale: "The three narrowed areas of each ureter are the ureteropelvic junction, the ureteral segment near the sacroiliac junction, and the ureterovesical junction. These three areas of the ureters have a propensity for obstruction by renal calculi or stricture. Obstruction of the ureteropelvic junction is most serious because of its close proximity to the kidney and the risk of associated kidney dysfunction. The urethra is not part of the ureter. (PTS:1 REF:p.1536)"
        },
        {
            id: 3,
            question: "3. A nurse is caring for a client with impaired renal function. A creatinine clearance measurement has been ordered. The nurse should facilitate collection of what samples?",
            options: [
                "A. A fasting serum potassium level and a random urine sample",
                "B. A 24-hour urine specimen and a serum creatinine level midway through the urine collection process",
                "C. A BUN and serum creatinine level on three consecutive mornings",
                "D. A sterile urine specimen and an electrolyte panel, including sodium, potassium, calcium, and phosphorus values"
            ],
            correct: 1, // B
            rationale: "To calculate creatinine clearance, a 24-hour urine specimen is collected. Midway through the collection, the serum creatinine level is measured. (PTS:1 REF:p.1539)"
        },
        {
            id: 4,
            question: "4. The nurse is assessing a client's bladder by percussion. The nurse elicits dullness after the client has voided. How should the nurse interpret this assessment finding?",
            options: [
                "A. The client's bladder is not completely empty.",
                "B. The client has kidney enlargement.",
                "C. The client has a ureteral obstruction.",
                "D. The client has a fluid volume deficit."
            ],
            correct: 0, // A
            rationale: "Dullness to percussion of the bladder following voiding indicates incomplete bladder emptying. Enlargement of the kidneys can be attributed to numerous conditions such as polycystic kidney disease or hydronephrosis and is not related to bladder fullness. Dehydration and ureteral obstruction are not related to bladder fullness; in fact, these conditions result in decreased flow of urine to the bladder. (PTS:1 REF:p.1545)"
        },
        {
            id: 5,
            question: "5. The nurse is providing preprocedure teaching about an ultrasound. The nurse informs the client that in preparation for an ultrasound of the lower urinary tract the client will require what action?",
            options: [
                "A. Increased fluid intake to produce a full bladder",
                "B. IV administration of radiopaque contrast agent",
                "C. Sedation and intubation",
                "D. Injection of a radioisotope"
            ],
            correct: 0, // A
            rationale: "Ultrasonography requires a full bladder; therefore, fluid intake should be encouraged before the procedure. The administration of a radiopaque contrast agent is required to perform IV urography studies, such as an IV pyelogram. Ultrasonography is a quick and painless diagnostic test and does not require sedation or intubation. The injection of a radioisotope is required for nuclear scan and ultrasonography is not in this category of diagnostic studies. (PTS:1 REF:p.1549)"
        },
        {
            id: 6,
            question: "6. The nurse is caring for a client who has a fluid volume deficit. When evaluating this client's urinalysis results, what should the nurse normally anticipate?",
            options: [
                "A. Decrease in blood urea nitrogen (BUN)",
                "B. Less antidiuretic hormone (ADH) released",
                "C. Decreased urine osmolality",
                "D. Increased urine specific gravity"
            ],
            correct: 3, // D
            rationale: "Urine specific gravity depends largely on hydration status. A decrease in fluid intake will lead to an increase in the urine specific gravity. With high fluid intake, specific gravity decreases. Blood urea nitrogen (BUN) levels are usually elevated with volume deficits related to dehydration. With decreased water intake as seen in a client with fluid volume deficit, blood osmolality increases, which stimulates antidiuretic hormone (ADH) release. ADH acts on the kidney, increasing water reabsorption and returning the blood osmolality to a normal level. Normally, urine osmolality increases (urine is concentrated) with fluid volume deficits. (PTS:1 REF:p.1548)"
        },
        {
            id: 7,
            question: "7. A geriatric nurse is performing an assessment of body systems on an older adult client. The nurse should be aware of what age-related change affecting the renal and urinary systems?",
            options: [
                "A. Increased ability to concentrate urine",
                "B. Increased bladder capacity",
                "C. Urinary incontinence",
                "D. Decreased glomerular filtration rate"
            ],
            correct: 3, // D
            rationale: "Many age-related changes in the renal and urinary systems should be taken into consideration when taking a health history of an older adult. One change includes a decreased glomerular surface area resulting in a decreased glomerular filtration rate. Other changes include the decreased ability to concentrate urine and a decreased bladder capacity. It also should be understood that urinary incontinence is not a normal age-related change, but is common in older adults, especially in women because of the loss of pelvic muscle tone. (PTS:1 REF:p.1539)"
        },
        {
            id: 8,
            question: "8. A nurse is preparing a client diagnosed with benign prostatic hyperplasia (BPH) for a lower urinary tract cystoscopic examination. The nurse should caution the client about what common temporary complication of this procedure?",
            options: [
                "A. Urinary retention",
                "B. Bladder perforation",
                "C. Hemorrhage",
                "D. Nausea"
            ],
            correct: 0, // A
            rationale: "After a cystoscopic examination, the client with obstructive pathology may experience urine retention if the instruments used during the examination cause edema. The nurse will carefully monitor the client with prostatic hyperplasia for urine retention. Postprocedure, the client will experience some hematuria, but is not at great risk for hemorrhage. Unless the condition is associated with another disorder, nausea is not commonly associated with this diagnostic study. Bladder perforation is rare. (PTS:1 REF:p.1552)"
        },
        {
            id: 9,
            question: "9. A client with gross hematuria has been admitted to a surgical floor in preparation for an upper cystoscopy in the morning. What post-procedure interventions would the nurse anticipate for this client? Select all that apply.",
            options: [
                "A. Nothing by mouth (NPO)",
                "B. Intermittent straight catheterization",
                "C. Sedative agent administration",
                "D. Moist heat to abdomen",
                "E. Monitor for urinary retention"
            ],
            correct: [1,3,4], // B, D, E
            rationale: "Post-procedural management is directed at relieving any discomfort from the procedure. Moist heat to the lower abdomen and warm sitz baths are helpful in relieving pain and relaxing muscles. The client may experience urinary retention, so intermittent straight catheterization may be necessary for a few hours after the procedure. The nurse would also monitor the client for signs of urinary tract infection and obstruction. NPO and sedative agent administration is accomplished before the procedure. A cystoscope examination/procedure is used to directly visualize the urethra and bladder. (PTS:1 REF:p.1552)"
        },
        {
            id: 10,
            question: "10. A kidney biopsy has been scheduled for a client with a history of acute kidney injury. The client asks the nurse why this test has been scheduled. What is the nurse's best response?",
            options: [
                "A. 'A biopsy is routinely ordered for all clients with renal disorders.'",
                "B. 'A biopsy is generally ordered following abnormal x-ray findings of the renal pelvis.'",
                "C. 'A biopsy is often ordered for clients before they have a kidney transplant.'",
                "D. 'A biopsy is sometimes necessary for diagnosing and evaluating the extent of kidney disease.'"
            ],
            correct: 3, // D
            rationale: "Biopsy of the kidney is used in diagnosing and evaluating the extent of kidney disease. Indications for biopsy include unexplained acute kidney injury, persistent proteinuria or hematuria, transplant rejection, and glomerulopathies. (PTS:1 REF:p.1552)"
        },
        {
            id: 11,
            question: "11. The nurse is caring for a client suspected of having renal dysfunction. When reviewing laboratory results for this client, the nurse interprets the presence of which substances in the urine as most suggestive of pathology?",
            options: [
                "A. Potassium and sodium",
                "B. Bicarbonate and urea",
                "C. Glucose and protein",
                "D. Creatinine and chloride"
            ],
            correct: 2, // C
            rationale: "The various substances normally filtered by the glomerulus, reabsorbed by the tubules, and excreted in the urine include sodium, chloride, bicarbonate, potassium, glucose, urea, creatinine, and uric acid. Within the tubule, some of these substances are selectively reabsorbed into the blood. Glucose is completely reabsorbed in the tubule and normally does not appear in the urine. However, glucose is found in the urine if the amount of glucose in the blood and glomerular filtrate exceeds the amount that the tubules are able to reabsorb. Protein molecules are also generally not found in the urine because amino acids are also filtered at the level of the glomerulus and reabsorbed so that they are not excreted in the urine. (PTS:1 REF:p.1537)"
        },
        {
            id: 12,
            question: "12. The nurse caring for a client with suspected renal dysfunction calculates that the client's weight has increased by 5 pounds (2.27 kg) in the past 24 hours. The nurse estimates that the client has retained approximately how much fluid?",
            options: [
                "A. 1,300 mL/ 43.9 fl oz. of fluid in 24 hours",
                "B. 2,270 mL/76.7 fl oz. of fluid in 24 hours",
                "C. 3,100 mL/104.8 fl oz. of fluid in 24 hours",
                "D. 5,000 mL/169.0 fl oz. of fluid in 24 hours"
            ],
            correct: 1, // B
            rationale: "An increase in body weight commonly accompanies edema. To calculate the approximate weight gain from fluid retention, the nurse should remember that 1 kg of weight gain equals approximately 1,000 mL of fluid. Five pounds = 2.27 kg = 2,270 mL. (PTS:1 REF:p.1546)"
        },
        {
            id: 13,
            question: "13. The nurse is performing a focused genitourinary and renal assessment of a client. Where should the nurse assess for pain at the costovertebral angle?",
            options: [
                "A. At the umbilicus and the right lower quadrant of the abdomen",
                "B. At the suprapubic region and the umbilicus",
                "C. At the lower border of the 12th rib and the spine",
                "D. At the 7th rib and the xiphoid process"
            ],
            correct: 2, // C
            rationale: "The costovertebral angle is the angle formed by the lower border of the 12th rib and the spine. Renal dysfunction may produce tenderness over the costovertebral angle. (PTS:1 REF:p.1544)"
        },
        {
            id: 14,
            question: "14. The nurse on a nephrology unit is caring for a diverse group of clients. For which client would a kidney biopsy most likely be contraindicated?",
            options: [
                "A. A 64-year-old client with chronic glomerulonephritis",
                "B. A 57-year-old client with proteinuria",
                "C. A 42-year-old client with morbid obesity",
                "D. A 16-year-old client with signs of kidney transplant rejection"
            ],
            correct: 2, // C
            rationale: "There are several contraindications to a kidney biopsy, including bleeding tendencies, uncontrolled hypertension, a solitary kidney, and morbid obesity. Indications for a kidney biopsy include unexplained acute kidney injury, persistent proteinuria or hematuria, transplant rejection, and glomerulopathies. (PTS:1 REF:p.1552)"
        },
        {
            id: 15,
            question: "15. The nurse is caring for a client who describes changes in voiding patterns. The client states, 'I feel the urge to empty my bladder several times an hour and when the urge hits me I have to get to the restroom quickly. But when I empty my bladder, there doesn't seem to be much urine flow.' What would the nurse expect this client's physical assessment to reveal?",
            options: [
                "A. Hematuria",
                "B. Urine retention",
                "C. Dehydration",
                "D. Kidney injury"
            ],
            correct: 1, // B
            rationale: "Increased urinary urgency and frequency coupled with decreasing urine volume strongly suggest urine retention. Hematuria may be an accompanying symptom, but is likely related to a urinary tract infection secondary to the retention of urine. Dehydration and kidney injury both result in a decrease in urine output, but the client with these conditions does not have normal urine production and decreased or minimal flow of urine to the bladder. The symptoms of urgency and frequency do not accompany kidney injury and dehydration due to decreased urine production. (PTS:1 REF:p.1542)"
        },
        {
            id: 16,
            question: "16. The nurse is caring for a client with a nursing diagnosis of deficient fluid volume. The nurse's assessment reveals a blood pressure (BP) of 98/52 mm Hg. The nurse should recognize that the client's kidneys will compensate by secreting what substance?",
            options: [
                "A. Antidiuretic hormone (ADH)",
                "B. Aldosterone",
                "C. Renin",
                "D. Angiotensin"

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
